name: pr-flow
description: >
  Governance de PR: maximo 2 abertos, CI obrigatorio, labels padrao, branch
  protection, preflight git-state. Fail-closed em violacao.
version: "1.0.0"

actions:
  check:
    description: Verifica se pode abrir novo PR (<2 abertos + branch OK)
    entrypoint: scripts/check.sh
    fail_closed: true
  apply:
    description: Instala governance em um repo (labels + protection + template + workflow)
    entrypoint: scripts/apply.sh
    fail_closed: true
  preflight-commit:
    description: Checklist pre-commit para evitar commit em branch errada
    entrypoint: scripts/preflight-commit.sh
    fail_closed: true

limits:
  max_open_prs_per_repo: 2
  max_lines_for_small_pr: 200
  hotfix_override: requires_explicit_user_authorization

required_labels:
  - ready-to-merge
  - blocked
  - needs-review

required_checks:
  - tests
  - smoke-build

branch_protection:
  targets: [main, develop]
  require_pull_request_review: true
  required_approving_review_count: 1
  require_status_checks: true
  enforce_admins: false
  require_conversation_resolution: true

fail_closed:
  on_over_limit: abort
  on_branch_main_or_develop: abort
  on_ci_not_green: abort
  on_orbit_engine_unreachable: abort
