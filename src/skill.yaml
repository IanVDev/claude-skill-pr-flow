name: pr-flow
description: >
  Governance de PR: CI obrigatorio, labels padrao, branch protection,
  preflight git-state e quatro regras de bloqueio substantivas.
  Fail-closed em violacao de governanca real.
version: "1.2.0"

actions:
  check:
    description: >
      Verifica branch e aplica quatro regras de bloqueio antes de abrir PR:
      escopo duplicado, conflito real, sem testes, risco critico sem aprovacao.
    entrypoint: scripts/check.sh
    fail_closed: true
  apply:
    description: Instala governance em um repo (labels + protection + template)
    entrypoint: scripts/apply.sh
    fail_closed: true
  preflight-commit:
    description: >
      Checklist pre-commit: bloqueia branch errada e aplica as quatro regras
      de bloqueio nos arquivos staged.
    entrypoint: scripts/preflight-commit.sh
    fail_closed: true

limits:
  max_lines_for_small_pr: 200
  hotfix_override: requires_explicit_user_authorization

blocking_rules:
  duplicate_scope: >
    Bloqueia se outro PR aberto modifica arquivos sobrepostos no mesmo
    branch alvo.
  real_conflict: >
    Bloqueia se git merge-tree detecta marcadores de conflito (<<<<<<<)
    contra origin/main.
  no_tests: >
    Bloqueia se diff toca src/ (logica) mas nenhum arquivo de teste
    (tests/, __tests__/, *.test.*, *.spec.*) foi alterado.
  critical_risk: >
    Bloqueia se diff toca auth/payment/billing/migration sem label
    approved, lgtm ou security-ok.

required_labels:
  - ready-to-merge
  - blocked
  - needs-review

required_checks:
  - tests
  - smoke-build

branch_protection:
  targets: [main, develop]
  require_pull_request_review: true
  required_approving_review_count: 1
  require_status_checks: true
  enforce_admins: false
  require_conversation_resolution: true

fail_closed:
  on_branch_main_or_develop: abort
  on_ci_not_green: abort
  on_orbit_engine_unreachable: abort
